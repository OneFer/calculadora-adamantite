<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Ascendente & Ancestral</title>
<style>
:root {
  --bg: #121212;
  --text: #fff;
  --card-bg: #1e1e1e;
  --accent: #4cafef;
}
body {
  font-family: Arial, sans-serif;
  background-color: var(--bg);
  color: var(--text);
  margin: 0;
  padding: 0;
}
header {
  padding: 1rem;
  text-align: center;
  background: var(--card-bg);
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 1rem;
}
.card {
  background: var(--card-bg);
  padding: 1rem;
  margin: 1rem 0;
  border-radius: 8px;
}
label {
  display: block;
  margin-top: 0.5rem;
}
input, select {
  width: 100%;
  padding: 0.4rem;
  margin-top: 0.3rem;
  border-radius: 5px;
  border: none;
}
button {
  margin-top: 1rem;
  padding: 0.6rem;
  border: none;
  background: var(--accent);
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
.result {
  white-space: pre-wrap;
  font-family: monospace;
}
.theme-selector {
  margin-top: 0.5rem;
}
</style>
</head>
<body>
<header>
  <h1>Calculadora de Recursos</h1>
  <div>
    <label for="theme">Tema:</label>
    <select id="theme" class="theme-selector">
      <option value="dark">Escuro</option>
      <option value="light">Claro</option>
      <option value="blue">Azul</option>
    </select>
  </div>
</header>

<div class="container">
  <div class="card">
    <label for="tipo">Tipo de cálculo:</label>
    <select id="tipo">
      <option value="ascendente">Ascendente</option>
      <option value="ancestral">Ancestral</option>
    </select>

    <label for="quantidade">Quantidade desejada:</label>
    <input type="number" id="quantidade" value="1280">

    <label for="chance">Chance de sucesso (em %):</label>
    <input type="range" id="chance" min="50" max="100" value="75">
    <span id="chanceValor">75%</span>

    <label for="tempoOpcional">Calcular tempo? (semanas):</label>
    <input type="number" id="tempoOpcional" placeholder="Deixe vazio para ignorar">

    <button onclick="calcular()">Calcular</button>
  </div>

  <div class="card result" id="resultado"></div>
</div>

<script>
const themes = {
  dark: { "--bg": "#121212", "--text": "#fff", "--card-bg": "#1e1e1e", "--accent": "#4cafef" },
  light: { "--bg": "#f5f5f5", "--text": "#000", "--card-bg": "#fff", "--accent": "#007bff" },
  blue: { "--bg": "#0d1b2a", "--text": "#e0e1dd", "--card-bg": "#1b263b", "--accent": "#415a77" }
};

document.getElementById("theme").addEventListener("change", e => {
  const theme = themes[e.target.value];
  for (let prop in theme) {
    document.documentElement.style.setProperty(prop, theme[prop]);
  }
});

document.getElementById("chance").addEventListener("input", e => {
  document.getElementById("chanceValor").textContent = e.target.value + "%";
});

function calcular() {
  const tipo = document.getElementById("tipo").value;
  const qtd = parseInt(document.getElementById("quantidade").value);
  const chance = parseInt(document.getElementById("chance").value) / 100;
  const semanas = parseInt(document.getElementById("tempoOpcional").value) || null;
  
  let resultado = "";

  if (tipo === "ancestral") {
    const ingots = Math.ceil(qtd * 9 / chance);
    const espiritos = ingots * 8;
    resultado += `🔹 Para ${qtd} blocos Ancestral:\n`;
    resultado += `- ${ingots} Arcane Ingots\n`;
    resultado += `- ${espiritos} Infernal Spirits\n`;
    resultado += `- ${espiritos} Earthen Spirits\n`;
    resultado += `- ${espiritos} Arcane Spirits\n`;
  } 
  else if (tipo === "ascendente") {
    const ingots = Math.ceil(qtd * 9 / chance);
    const espiritos = ingots * 8;
    const blocos = qtd;
    resultado += `🔹 Para ${qtd} blocos Ascendente:\n`;
    resultado += `- ${ingots} Arcane Ingots\n`;
    resultado += `- ${espiritos} Infernal Spirits\n`;
    resultado += `- ${espiritos} Earthen Spirits\n`;
    resultado += `- ${espiritos} Arcane Spirits\n`;
    resultado += `- ${blocos*24} Eldritch Spirits\n`;
    resultado += `- ${blocos*24} Arcane Spirits (purificação)\n`;
    resultado += `- ${blocos*16} Sagrado Spirits\n`;
    resultado += `- ${blocos*24} Soul Stained Steel Plating\n`;
    resultado += `- ${blocos*16} Void Salts\n`;
    resultado += `- ${blocos*16} Null Void\n`;
    resultado += `- ${blocos*24} Blaze Powder\n`;
    resultado += `- ${blocos*16} Null Slate\n`;
  }

  if (semanas) {
    const dias = semanas * 7;
    const horas = dias * 5; // assumindo 5h por dia
    resultado += `\n⏳ Meta: ${semanas} semanas (${dias} dias, ${horas} horas de jogo)\n`;
  }

  document.getElementById("resultado").textContent = resultado;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenebris Fabricator - Calculadora de Crafting</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f1115; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
        input[type="range"] { cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useMemo } = React;

        // Ícones SVG Inline - Corrigidos com React.Fragment para evitar SyntaxError
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                Settings2: <path d="M20 7h-9m-4 0H4m16 5h-4m-4 0H4m16 5h-7m-4 0H4m12-10V5m0 4V5m-9 4V5m9 10v-2m-9 10v-2" />,
                Database: <path d="M3 5v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2zm0 7h18m-18 5h18" />,
                Hammer: <path d="m15 12-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0-.83-.83-.83-2.17 0-3L12 9l3 3Z" />,
                Info: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></React.Fragment>,
                Layers: <React.Fragment><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.1 6.1a2 2 0 0 0 0 3.8l9.07 3.91a2 2 0 0 0 1.66 0l9.07-3.91a2 2 0 0 0 0-3.8Z"/><path d="m2.1 14.74 8.94 3.86a2 2 0 0 0 1.92 0l8.94-3.86"/><path d="m2.1 10.32 8.94 3.86a2 2 0 0 0 1.92 0l8.94-3.86"/></React.Fragment>,
                Package: <React.Fragment><path d="M16.5 9.4 7.5 4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></React.Fragment>,
                ArrowRight: <React.Fragment><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></React.Fragment>,
                Calculator: <React.Fragment><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></React.Fragment>,
                CheckCircle2: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></React.Fragment>,
                RefreshCcw: <React.Fragment><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></React.Fragment>,
                Check: <path d="m20 6-11 11-5-5" />,
                RotateCcw: <React.Fragment><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></React.Fragment>,
                Box: <React.Fragment><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></React.Fragment>
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        // --- CONFIGURAÇÃO DE RECEITAS ---
        const RECIPES = {
            'arcane_ingot': { name: 'Arcane Ingot', tier: 'Arcane', inputs: [{ id: 'arcane_essence', qty: 500 }, { id: 'iron_ingot', qty: 1 }, { id: 'thermal_monitor_durability', qty: 1 }] },
            'arcane_block': { name: 'Arcane Block', tier: 'Arcane', inputs: [{ id: 'arcane_ingot', qty: 9 }] },
            'powdered_arcane': { name: 'Powdered Arcane', multiplier: 2, useArcaneReturn: true, inputs: [{ id: 'arcane_ingot', qty: 1 }] },
            'ancestral_ingot': { name: 'Ancestral Ingot', tier: 'Ancestral', chance: 0.77, inputs: [{ id: 'arcane_ingot', qty: 1 }, { id: 'lava', qty: 2000 }, { id: 'infernal_spirit', qty: 4 }, { id: 'arcane_spirit', qty: 4 }, { id: 'earthen_spirit', qty: 4 }] },
            'ancestral_block': { name: 'Ancestral Block', tier: 'Ancestral', inputs: [{ id: 'ancestral_ingot', qty: 9 }] },
            'ascendant_block': { name: 'Ascendant Block', tier: 'Ascendant', inputs: [{ id: 'ancestral_block', qty: 1 }, { id: 'soul_stained_steel_plating', qty: 24 }, { id: 'eldritch_spirit', qty: 24 }, { id: 'arcane_spirit', qty: 24 }, { id: 'sagrado_spirit', qty: 16 }, { id: 'earthen_spirit', qty: 16 }, { id: 'infernal_spirit', qty: 16 }, { id: 'void_salt', qty: 16 }, { id: 'null_void', qty: 16 }, { id: 'blaze_powder', qty: 24 }, { id: 'null_slate', qty: 16 }] },
            'ascendant_ingot': { name: 'Ascendant Ingot', tier: 'Ascendant', inputs: [{ id: 'ascendant_block', qty: 1/9 }] },
            'esoteric_ingot': { name: 'Esoteric Ingot', tier: 'Esoteric', inputs: [{ id: 'heated_esoteric_metal', qty: 1 }, { id: 'arcane_essence', qty: 500 }] },
            'esoteric_block': { name: 'Esoteric Block', tier: 'Esoteric', inputs: [{ id: 'esoteric_ingot', qty: 9 }] },
            'heated_esoteric_metal': { name: 'Heated Esoteric Metal', inputs: [{ id: 'polished_esoteric_metal', qty: 1 }, { id: 'thermal_monitor_durability', qty: 1 }] },
            'polished_esoteric_metal': { name: 'Polished Esoteric Metal', inputs: [{ id: 'rough_esoteric_metal', qty: 1 }, { id: 'ascendant_sandpaper_durability', qty: 1, optional: 'auto_polish' }] },
            'rough_esoteric_metal': { name: 'Rough Esoteric Metal', inputs: [{ id: 'esoteric_cast', qty: 1 }] },
            'esoteric_cast': { name: 'Esoteric Cast', inputs: [{ id: 'golden_brilliance', qty: 1 }, { id: 'arcane_essence', qty: 500 }] },
            'golden_brilliance': { name: 'Golden Brilliance', inputs: [{ id: 'golden_ascendance_plate', qty: 1 }, { id: 'experience_block', qty: 4 }] },
            'golden_ascendance_plate': { name: 'Golden Ascendance Plate', inputs: [{ id: 'golden_ascendance_block', qty: 1/9 }] },
            'golden_ascendance_block': { name: 'Golden Ascendance Block', inputs: [{ id: 'ascendant_block', qty: 1 }, { id: 'gold_block', qty: 8 }] },
            'mithril_ingot': { name: 'Mithril Ingot', tier: 'Mithril', chance: 0.80, recycleId: 'rough_mithril_metal', recycleChance: 0.20, inputs: [{ id: 'polished_mithril_metal', qty: 1 }, { id: 'lava', qty: 3000 }, { id: 'pure_vitae', qty: 1500 }] },
            'mithril_block': { name: 'Mithril Block', tier: 'Mithril', inputs: [{ id: 'mithril_ingot', qty: 9 }] },
            'polished_mithril_metal': { name: 'Polished Mithril Metal', inputs: [{ id: 'rough_mithril_metal', qty: 1 }, { id: 'ascendant_sandpaper_durability', qty: 1, optional: 'auto_polish' }] },
            'rough_mithril_metal': { name: 'Rough Mithril Metal', inputs: [{ id: 'mithril_matter', qty: 1 }, { id: 'pure_vitae', qty: 10 }] },
            'mithril_matter': { name: 'Mithril Matter', inputs: [{ id: 'mithril_alloy', qty: 1 }, { id: 'harmonic_essence', qty: 500 }] },
            'mithril_alloy': { name: 'Mithril Alloy', inputs: [{ id: 'esoteric_ingot', qty: 1 }, { id: 'netherite_ingot', qty: 1 }] },
            'netherite_ingot': { name: 'Netherite Ingot', inputs: [{ id: 'gold_ingot', qty: 4 }, { id: 'netherite_scrap', qty: 4 }] },
            'harmonic_essence': { name: 'Harmonic Essence', multiplier: 1000, inputs: [{ id: 'thermal_monitor_durability', qty: 1 }, { id: 'pure_vitae', qty: 500 }, { id: 'cursed_vitae', qty: 500 }] },
            'pure_vitae': { name: 'Pure Vitae', multiplier: 1000, inputs: [{ id: 'powdered_arcane', qty: 8 }, { id: 'condensed_runic_sap', qty: 1 }] },
            'cursed_vitae': { name: 'Cursed Vitae', multiplier: 1000, inputs: [{ id: 'powdered_arcane', qty: 8 }, { id: 'condensed_cursed_sap', qty: 1 }] },
            'soul_stained_steel_plating': { name: 'Soul Stained Steel Plating', multiplier: 2, inputs: [{ id: 'soul_stained_steel_ingot', qty: 1 }, { id: 'soul_stained_steel_nugget', qty: 4 }] },
            'soul_stained_steel_ingot': { name: 'Soul Stained Steel Ingot', inputs: [{ id: 'processed_soulstone', qty: 4 }, { id: 'wicked_spirit', qty: 3 }, { id: 'arcane_spirit', qty: 1 }, { id: 'earthen_spirit', qty: 1 }] },
            'soul_stained_steel_nugget': { name: 'Soul Stained Steel Nugget', inputs: [{ id: 'soul_stained_steel_ingot', qty: 1/9 }] },
            'thermal_monitor_durability': { name: 'Thermal Monitor (Uso)', inputs: [{ id: 'thermal_monitor_mechanism', qty: 1/256 }] },
            'thermal_monitor_mechanism': { name: 'Thermal Monitor Mechanism', inputs: [{ id: 'brass_ingot', qty: 5 }, { id: 'obsidian', qty: 5 }, { id: 'redstone', qty: 5 }] },
            'ascendant_sandpaper_durability': { name: 'Sandpaper (Uso)', inputs: [{ id: 'ascendant_sandpaper', qty: 1/16 }] },
            'ascendant_sandpaper': { name: 'Ascendant Sandpaper', inputs: [{ id: 'sand', qty: 1 }, { id: 'paper', qty: 1 }, { id: 'powdered_ascendant', qty: 1 }] },
            'powdered_ascendant': { name: 'Powdered Ascendant', multiplier: 2, chance: 0.25, inputs: [{ id: 'ascendant_ingot', qty: 1 }] }
        };

        const ITEMS_DATA = {
            'arcane_essence': { name: 'Arcane Essence', unit: 'mb', color: 'text-purple-400' },
            'lava': { name: 'Lava', unit: 'mb', color: 'text-orange-500' },
            'iron_ingot': { name: 'Iron Ingot', unit: 'un', color: 'text-gray-300' },
            'gold_block': { name: 'Gold Block', unit: 'un', color: 'text-yellow-400' },
            'gold_ingot': { name: 'Gold Ingot', unit: 'un', color: 'text-yellow-500' },
            'netherite_scrap': { name: 'Netherite Scrap', unit: 'un', color: 'text-neutral-500' },
            'condensed_runic_sap': { name: 'Condensed Runic Sap', unit: 'un', color: 'text-cyan-400' },
            'condensed_cursed_sap': { name: 'Condensed Cursed Sap', unit: 'un', color: 'text-emerald-700' },
            'experience_block': { name: 'Experience Block', unit: 'un', color: 'text-green-400' },
            'infernal_spirit': { name: 'Infernal Spirit', unit: 'un', color: 'text-red-500' },
            'arcane_spirit': { name: 'Arcane Spirit', unit: 'un', color: 'text-purple-500' },
            'earthen_spirit': { name: 'Earthen Spirit', unit: 'un', color: 'text-yellow-700' },
            'eldritch_spirit': { name: 'Eldritch Spirit', unit: 'un', color: 'text-indigo-600' },
            'sagrado_spirit': { name: 'Sagrado Spirit', unit: 'un', color: 'text-yellow-200' },
            'wicked_spirit': { name: 'Wicked Spirit', unit: 'un', color: 'text-pink-600' },
            'void_salt': { name: 'Void Salt', unit: 'un', color: 'text-blue-200' },
            'null_void': { name: 'Null Void', unit: 'un', color: 'text-gray-800' },
            'blaze_powder': { name: 'Blaze Powder', unit: 'un', color: 'text-orange-400' },
            'null_slate': { name: 'Null Slate', unit: 'un', color: 'text-gray-600' },
            'processed_soulstone': { name: 'Processed Soulstone', unit: 'un', color: 'text-blue-400' },
            'brass_ingot': { name: 'Brass Ingot', unit: 'un', color: 'text-yellow-600' },
            'obsidian': { name: 'Obsidian', unit: 'un', color: 'text-purple-900' },
            'redstone': { name: 'Redstone', unit: 'un', color: 'text-red-600' },
            'sand': { name: 'Sand', unit: 'un', color: 'text-yellow-100' },
            'paper': { name: 'Paper', unit: 'un', color: 'text-white' },
        };

        function App() {
            const [targetItem, setTargetItem] = useState('mithril_ingot');
            const [quantityInput, setQuantityInput] = useState('1');
            const [useAutoPolish, setUseAutoPolish] = useState(true);
            const [ancestralChance, setAncestralChance] = useState(77);
            const [arcaneReturnChance, setArcaneReturnChance] = useState(75);
            const [inventory, setInventory] = useState({});
            const [completedItems, setCompletedItems] = useState(new Set());
            const [viewMode, setViewMode] = useState('calc');

            const quantity = parseInt(quantityInput) || 0;

            const updateInventory = (id, val) => {
                setInventory(prev => ({ ...prev, [id]: Math.max(0, parseFloat(val) || 0) }));
            };

            const toggleComplete = (id) => {
                setCompletedItems(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const resetAll = () => {
                setInventory({});
                setCompletedItems(new Set());
            };

            const totals = useMemo(() => {
                const results = {};
                const stockUsed = {};

                function calculate(itemId, requiredQty) {
                    if (requiredQty <= 0) return;

                    if (!results[itemId]) {
                        results[itemId] = { gross: 0, net: 0, isResource: !!ITEMS_DATA[itemId] };
                    }
                    
                    results[itemId].gross += requiredQty;

                    const isManualDone = completedItems.has(itemId);
                    const inStock = inventory[itemId] || 0;
                    const alreadyUsed = stockUsed[itemId] || 0;
                    
                    const available = isManualDone ? 1000000000 : Math.max(0, inStock - alreadyUsed);
                    
                    let needed = requiredQty;
                    if (available > 0) {
                        const taken = Math.min(requiredQty, available);
                        stockUsed[itemId] = (stockUsed[itemId] || 0) + taken;
                        needed -= taken;
                    }

                    results[itemId].net += needed;

                    if (needed > 0 && RECIPES[itemId]) {
                        const recipe = RECIPES[itemId];
                        let attempts = needed / (recipe.multiplier || 1);

                        if (itemId === 'ancestral_ingot') attempts /= (ancestralChance / 100);
                        else if (recipe.useArcaneReturn) attempts *= (100 - arcaneReturnChance) / 100;
                        else if (recipe.chance) attempts /= recipe.chance;

                        recipe.inputs.forEach(input => {
                            if (input.optional === 'auto_polish' && !useAutoPolish) return;
                            let inputQty = attempts * input.qty;
                            if (recipe.recycleId && input.id === recipe.recycleId) {
                                const returnedQty = (attempts * recipe.recycleChance);
                                inputQty -= returnedQty;
                            }
                            calculate(input.id, inputQty);
                        });
                    }
                }

                calculate(targetItem, quantity);
                return { items: results, stockUsed };
            }, [targetItem, quantity, useAutoPolish, ancestralChance, arcaneReturnChance, inventory, completedItems]);

            // Filtragem e Ordenação de maior para menor (baseado no net que falta coletar)
            const rawResources = useMemo(() => 
                Object.entries(totals.items)
                    .filter(([_, d]) => d.isResource)
                    .sort((a, b) => b[1].net - a[1].net),
                [totals.items]
            );

            const intermediateItems = useMemo(() => 
                Object.entries(totals.items)
                    .filter(([id, d]) => !d.isResource && id !== targetItem)
                    .sort((a, b) => b[1].net - a[1].net),
                [totals.items, targetItem]
            );

            const ItemCard = ({ id, data, isInter }) => {
                const isDone = data.net <= 0.0001;
                const isManualDone = completedItems.has(id);
                const itemName = isInter ? (RECIPES[id]?.name || id) : (ITEMS_DATA[id]?.name || id);
                const unit = isInter ? 'un' : (ITEMS_DATA[id]?.unit || 'un');
                const colorClass = isInter ? 'text-neutral-300' : (ITEMS_DATA[id]?.color || 'text-neutral-300');

                return (
                    <div className={`flex flex-col p-4 rounded-2xl border transition-all duration-300 relative ${isDone ? 'bg-green-500/10 border-green-500/40 shadow-[0_0_20px_rgba(34,197,94,0.1)]' : 'bg-neutral-800/40 border-neutral-700/50'}`}>
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-3">
                                <button onClick={() => toggleComplete(id)} className={`w-6 h-6 rounded-lg flex items-center justify-center transition-all border-2 ${isManualDone ? 'bg-green-600 border-green-600 text-white' : 'border-neutral-700 hover:border-purple-500 text-transparent hover:text-purple-500'}`}><Icon name="Check" className="w-4 h-4" /></button>
                                <div className="flex flex-col">
                                    <span className={`text-sm font-black flex items-center gap-2 ${colorClass}`}>{itemName}{isDone && <Icon name="CheckCircle2" className="w-4 h-4 text-green-500 animate-in zoom-in duration-300" />}</span>
                                    <span className="text-[9px] text-neutral-600 font-bold uppercase tracking-tighter">Total Requerido: {data.gross.toFixed(1)} {unit}</span>
                                </div>
                            </div>
                            <div className="text-right">
                                <div className={`text-lg font-mono font-black ${isDone ? 'text-green-500' : 'text-white'}`}>
                                    {isDone ? 'PRONTO' : (data.net > 100 ? Math.ceil(data.net).toLocaleString() : data.net.toFixed(1))} {!isDone && <span className="ml-1 text-[10px] text-neutral-500 uppercase">{unit}</span>}
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-2 bg-neutral-950/50 p-2 rounded-xl border border-neutral-800/50">
                            <Icon name="Package" className="w-3 h-3 text-neutral-600" />
                            <input type="text" placeholder="Estoque..." value={inventory[id] || ''} onChange={(e) => updateInventory(id, e.target.value.replace(/[^0-9.]/g, ''))} disabled={isManualDone} className="bg-transparent border-none text-[10px] font-mono font-bold text-purple-400 focus:ring-0 w-full p-0" />
                            {totals.stockUsed[id] > 0 && <div className="flex items-center gap-1 text-green-500 text-[9px] font-bold ml-auto font-black uppercase"><Icon name="ArrowRight" className="w-2 h-2" /> Usados: {totals.stockUsed[id].toFixed(1)}</div>}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-neutral-950 text-neutral-200 p-4 md:p-8 font-sans">
                    <div className="max-w-7xl mx-auto">
                        <header className="mb-8 flex flex-col lg:flex-row lg:items-end justify-between gap-6 border-b border-neutral-800 pb-8">
                            <div className="space-y-2">
                                <div className="flex items-center gap-3">
                                    <div className="bg-purple-600 p-2 rounded-lg shadow-lg shadow-purple-900/20"><Icon name="Calculator" className="w-6 h-6 text-white" /></div>
                                    <h1 className="text-3xl font-black tracking-tighter text-white uppercase italic">Tenebris <span className="text-purple-500">Fabricator</span></h1>
                                </div>
                                <p className="text-neutral-500 font-bold text-xs uppercase tracking-widest opacity-60">Inventory & Resource Management</p>
                            </div>
                            <div className="flex flex-wrap items-center gap-4">
                                {(Object.keys(inventory).length > 0 || completedItems.size > 0) && <button onClick={resetAll} className="flex items-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 px-5 py-2.5 rounded-xl text-xs font-black uppercase transition-all border border-red-500/20"><Icon name="RefreshCcw" className="w-3 h-3" /> Limpar Tudo</button>}
                                <nav className="flex bg-neutral-900 p-1.5 rounded-xl border border-neutral-800 shadow-inner">
                                    <button onClick={() => setViewMode('calc')} className={`px-8 py-2.5 rounded-lg text-xs font-black uppercase transition-all ${viewMode === 'calc' ? 'bg-purple-600 text-white shadow-lg shadow-purple-900/20' : 'text-neutral-500 hover:text-neutral-300'}`}>Calculadora</button>
                                    <button onClick={() => setViewMode('recipes')} className={`px-8 py-2.5 rounded-lg text-xs font-black uppercase transition-all ${viewMode === 'recipes' ? 'bg-purple-600 text-white shadow-lg shadow-purple-900/20' : 'text-neutral-500 hover:text-neutral-300'}`}>Receitas</button>
                                </nav>
                            </div>
                        </header>

                        {viewMode === 'calc' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-4 space-y-6">
                                    <section className="bg-neutral-900/50 border border-neutral-800 rounded-3xl p-6 shadow-2xl backdrop-blur-md">
                                        <h2 className="text-[10px] font-black text-neutral-500 uppercase tracking-[0.3em] mb-8 flex items-center gap-2"><Icon name="Settings2" className="w-4 h-4 text-purple-500" /> Configuração</h2>
                                        <div className="space-y-8">
                                            <div className="space-y-3">
                                                <label className="text-[10px] font-black text-neutral-500 uppercase">Item de Destino</label>
                                                <select value={targetItem} onChange={(e) => setTargetItem(e.target.value)} className="w-full bg-neutral-950 border-2 border-neutral-800 rounded-2xl p-4 text-sm font-black focus:border-purple-500 outline-none cursor-pointer">
                                                    {Object.entries(RECIPES).filter(([_, r]) => r.tier).sort((a,b) => a[1].name.localeCompare(b[1].name)).map(([id, r]) => (
                                                        <option key={id} value={id}>{r.name} ({r.tier})</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-[10px] font-black text-neutral-500 uppercase">Volume Desejado</label>
                                                <input type="text" value={quantityInput} onChange={(e) => setQuantityInput(e.target.value.replace(/[^0-9]/g, ''))} className="w-full bg-neutral-950 border-2 border-neutral-800 rounded-2xl p-5 text-2xl font-mono font-black text-purple-400 focus:border-purple-500 outline-none" />
                                            </div>
                                            <div className="bg-neutral-800/30 p-6 rounded-3xl border border-neutral-700/30 space-y-6">
                                                <label className="flex items-center justify-between cursor-pointer group"><span className="text-xs font-black text-neutral-400 uppercase tracking-wider group-hover:text-purple-400 transition-colors">Polimento Automático</span>
                                                    <div className={`w-14 h-7 rounded-full relative transition-all duration-300 ${useAutoPolish ? 'bg-purple-600' : 'bg-neutral-800 border border-neutral-700'}`}>
                                                        <input type="checkbox" className="hidden" checked={useAutoPolish} onChange={() => setUseAutoPolish(!useAutoPolish)} />
                                                        <div className={`absolute top-1 w-5 h-5 bg-white rounded-full transition-all duration-300 shadow-md ${useAutoPolish ? 'left-8' : 'left-1'}`} />
                                                    </div>
                                                </label>
                                                <div className="space-y-4">
                                                    <div className="flex justify-between text-[10px] font-black text-neutral-500 uppercase"><span>Chance Ancestral</span><span className="text-purple-400 font-mono text-xs">{ancestralChance}%</span></div>
                                                    <input type="range" min="50" max="100" value={ancestralChance} onChange={(e) => setAncestralChance(parseInt(e.target.value))} className="w-full h-2 bg-neutral-900 rounded-lg appearance-none cursor-pointer accent-purple-500 border border-neutral-800" />
                                                </div>
                                                <div className="space-y-4">
                                                    <div className="flex justify-between text-[10px] font-black text-neutral-500 uppercase"><span>Retorno de Arcane (Pó)</span><span className="text-purple-400 font-mono text-xs">{arcaneReturnChance}%</span></div>
                                                    <input type="range" min="0" max="100" value={arcaneReturnChance} onChange={(e) => setArcaneReturnChance(parseInt(e.target.value))} className="w-full h-2 bg-neutral-900 rounded-lg appearance-none cursor-pointer accent-purple-500 border border-neutral-800" />
                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                    <div className="p-6 bg-blue-950/20 border-2 border-blue-500/10 rounded-3xl flex gap-3 italic">
                                        <Icon name="RotateCcw" className="w-5 h-5 text-blue-400 shrink-0" />
                                        <p className="text-[11px] text-blue-200/50 leading-relaxed font-medium">Lembre-se: O <b>Mithril Ingot</b> tem 20% de reciclagem. Falhas devolvem o metal base, poupando a criação inicial mas exigindo polimento extra.</p>
                                    </div>
                                </div>
                                <div className="lg:col-span-8 space-y-8">
                                    <section className="bg-neutral-900 border border-neutral-800 rounded-3xl overflow-hidden shadow-2xl">
                                        <div className="p-6 border-b border-neutral-800 bg-neutral-900/50 flex gap-3 items-center"><Icon name="Database" className="w-5 h-5 text-purple-500" /><h2 className="text-sm font-black uppercase text-white tracking-widest">Recursos Base</h2></div>
                                        <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {rawResources.map(([id, data]) => <ItemCard key={id} id={id} data={data} isInter={false} />)}
                                        </div>
                                    </section>
                                    <section className="bg-neutral-900 border border-neutral-800 rounded-3xl overflow-hidden shadow-2xl">
                                        <div className="p-6 border-b border-neutral-800 bg-neutral-900/50 flex gap-3 items-center"><Icon name="Layers" className="w-5 h-5 text-indigo-500" /><h2 className="text-sm font-black uppercase text-white tracking-widest">Intermediários</h2></div>
                                        <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {intermediateItems.map(([id, data]) => <ItemCard key={id} id={id} data={data} isInter={true} />)}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-neutral-900 border border-neutral-800 rounded-[3rem] p-12 shadow-2xl">
                                <h2 className="text-3xl font-black text-white mb-12 flex items-center gap-4 uppercase tracking-tighter italic"><Icon name="Layers" className="w-10 h-10 text-purple-500" /> Blueprint Dictionary</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                                    {Object.entries(RECIPES).filter(([_, r]) => r.tier).sort((a,b) => a[1].name.localeCompare(b[1].name)).map(([id, r]) => (
                                        <div key={id} className="bg-neutral-950 border border-neutral-800 rounded-3xl p-8 hover:border-purple-500 transition-all group relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-500/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                            <div className="flex items-center justify-between mb-6">
                                                <h3 className="font-black text-lg text-white uppercase italic">{r.name}</h3>
                                                <span className="text-[9px] font-black px-3 py-1 bg-purple-500/10 text-purple-500 rounded-full border border-purple-500/20 uppercase tracking-widest">{r.tier}</span>
                                            </div>
                                            <div className="space-y-3">
                                                <div className="text-[9px] font-black text-neutral-600 uppercase mb-4 pb-2 border-b border-neutral-900">Standard Ingredients</div>
                                                {r.inputs.map((input, idx) => (
                                                    <div key={idx} className={`flex justify-between items-center text-xs ${input.optional === 'auto_polish' ? 'text-neutral-600 italic' : 'text-neutral-400 font-medium'}`}>
                                                        <span>{ITEMS_DATA[input.id]?.name || RECIPES[input.id]?.name || input.id}</span>
                                                        <span className="font-mono font-bold text-neutral-500">
                                                            {input.qty < 1 ? input.qty.toFixed(3) : input.qty.toLocaleString()}
                                                            <span className="ml-1 opacity-40 uppercase text-[8px]">{ITEMS_DATA[input.id]?.unit || 'un'}</span>
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>

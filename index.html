        function App() {
            const [viewMode, setViewMode] = useState('calc');
            const [targetItem, setTargetItem] = useState('adamantite_ingot');
            const [targetTemplate, setTargetTemplate] = useState('arcane_template');
            const [quantityInput, setQuantityInput] = useState('1');
            const [ancestralChance, setAncestralChance] = useState(77);
            const [arcaneReturnChance, setArcaneReturnChance] = useState(75);
            const [useCheapCraft, setUseCheapCraft] = useState(false);
            const [completedItems, setCompletedItems] = useState(new Set());

            const quantity = Math.max(0, parseInt(quantityInput) || 0);
            const activeTarget = viewMode === 'templates' ? targetTemplate : targetItem;

            const totals = useMemo(() => {
                const results = {};
                const surplusPool = {};

                function calculate(itemId, requiredQty) {
                    if (requiredQty <= 0.0001) return;

                    const availableInSurplus = surplusPool[itemId] || 0;
                    const takenFromSurplus = Math.min(requiredQty, availableInSurplus);
                    let needed = requiredQty - takenFromSurplus;
                    surplusPool[itemId] = Math.max(0, availableInSurplus - takenFromSurplus);

                    if (completedItems.has(itemId)) needed = 0;

                    if (!results[itemId]) results[itemId] = { net: 0, gross: 0, isResource: !!ITEMS_DATA[itemId] };
                    results[itemId].net += needed;
                    results[itemId].gross += requiredQty;

                    if (needed <= 0.0001) return;

                    const recipe = RECIPES[itemId];
                    if (!recipe) return;

                    const yieldPerCraft = recipe.yield || 1;
                    let probFactor = 1;
                    if (itemId === 'ancestral_ingot') probFactor = 1 / (ancestralChance / 100);
                    else if (recipe.useArcaneReturn) probFactor = (100 - arcaneReturnChance) / 100;
                    else if (recipe.chance) probFactor = 1 / recipe.chance;

                    const numCrafts = Math.ceil(needed / (yieldPerCraft / probFactor));
                    const totalProduced = numCrafts * yieldPerCraft;
                    
                    const leftOver = totalProduced - (needed * probFactor);
                    if (leftOver > 0.001) surplusPool[itemId] = (surplusPool[itemId] || 0) + leftOver;

                    const inputs = (useCheapCraft && recipe.cheapInputs) ? recipe.cheapInputs : recipe.inputs;

                    inputs.forEach(input => {
                        let inputQty = numCrafts * input.qty;
                        if (recipe.recycleId && input.id === recipe.recycleId) {
                            const recycleQty = numCrafts * recipe.recycleChance;
                            inputQty = Math.max(0, inputQty - recycleQty);
                        }
                        calculate(input.id, inputQty);
                    });
                }

                calculate(activeTarget, quantity);
                return { items: results, surplus: surplusPool };
            }, [activeTarget, quantity, ancestralChance, arcaneReturnChance, completedItems, useCheapCraft, viewMode]);

            const sortedRaw = Object.entries(totals.items).filter(([_, d]) => d.isResource).sort((a,b) => b[1].net - a[1].net);
            const sortedInter = Object.entries(totals.items).filter(([id, d]) => !d.isResource && id !== activeTarget).sort((a,b) => b[1].net - a[1].net);

            return (
                <div className="min-h-screen p-4 max-w-5xl mx-auto">
                    <header className="mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-zinc-800 pb-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-violet-600 p-1.5 rounded-md shadow-lg"><Icon name="Calculator" className="text-white w-5 h-5" /></div>
                            <h1 className="text-lg font-black uppercase tracking-tight italic leading-none">Tenebris <span className="text-violet-500 text-sm block sm:inline">Fabricator</span></h1>
                        </div>
                        <nav className="flex bg-zinc-900 p-1 rounded-lg border border-zinc-800 flex-wrap justify-center">
                            {['calc', 'templates', 'surplus', 'recipes'].map(m => (
                                <button key={m} onClick={() => { setViewMode(m); setCompletedItems(new Set()); }} className={`px-3 py-1.5 rounded-md text-[9px] font-bold uppercase transition-all ${viewMode === m ? 'bg-violet-600 text-white' : 'text-zinc-500 hover:text-zinc-300'}`}>
                                    {m === 'calc' ? 'Painel' : m === 'templates' ? 'Equips' : m === 'surplus' ? 'Sobras' : 'Guia'}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {viewMode === 'calc' || viewMode === 'templates' ? (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <aside className="lg:col-span-4 space-y-4">
                                <div className="bg-zinc-900/50 p-4 rounded-xl border border-zinc-800 space-y-4 shadow-xl">
                                    <div>
                                        <label className="text-[9px] font-black text-zinc-500 uppercase mb-1 block tracking-widest">Selecione o Alvo</label>
                                        {viewMode === 'calc' ? (
                                            <select value={targetItem} onChange={(e) => setTargetItem(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-md p-2 text-xs font-bold outline-none focus:border-violet-500">
                                                {Object.entries(RECIPES).filter(([_, r]) => r.tier && r.tier !== 'Templates').sort((a,b) => a[1].tier.localeCompare(b[1].tier)).map(([id, r]) => <option key={id} value={id}>{r.name} ({r.tier})</option>)}
                                            </select>
                                        ) : (
                                            <select value={targetTemplate} onChange={(e) => setTargetTemplate(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded-md p-2 text-xs font-bold outline-none focus:border-violet-500">
                                                {Object.entries(RECIPES).filter(([_, r]) => r.tier === 'Templates').map(([id, r]) => <option key={id} value={id}>{r.name}</option>)}
                                            </select>
                                        )}
                                    </div>
                                    <div>
                                        <label className="text-[9px] font-black text-zinc-500 uppercase mb-1 block tracking-widest">Quantidade</label>
                                        <input type="text" value={quantityInput} onChange={(e) => setQuantityInput(e.target.value.replace(/[^0-9]/g, ''))} className="w-full bg-zinc-950 border border-zinc-800 rounded-md p-2 text-lg font-mono font-black text-violet-400 outline-none" />
                                    </div>
                                    
                                    <div className="pt-4 border-t border-zinc-800 space-y-4">
                                        <div className="flex items-center justify-between group cursor-pointer" onClick={() => setUseCheapCraft(!useCheapCraft)}>
                                            <div className="flex items-center gap-2">
                                                <Icon name="Copy" className={useCheapCraft ? "text-violet-400" : "text-zinc-600"} />
                                                <span className="text-[9px] font-black uppercase text-zinc-400">Modo Duplicação</span>
                                            </div>
                                            <div className={`w-8 h-4 rounded-full relative transition-all ${useCheapCraft ? 'bg-violet-600' : 'bg-zinc-800'}`}>
                                                <div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${useCheapCraft ? 'left-4.5' : 'left-0.5'}`} />
                                            </div>
                                        </div>

                                        <div className="space-y-3">
                                            <div className="flex justify-between text-[9px] font-black uppercase text-zinc-500"><span>Ancestral Success</span><span className="text-violet-400">{ancestralChance}%</span></div>
                                            <input type="range" min="50" max="100" value={ancestralChance} onChange={(e) => setAncestralChance(e.target.value)} className="w-full h-1 bg-zinc-800 rounded-lg appearance-none" />
                                        </div>
                                    </div>

                                    <button onClick={() => setCompletedItems(new Set())} className="w-full py-2 bg-zinc-800 text-zinc-500 rounded-md text-[9px] font-black uppercase flex items-center justify-center gap-2 hover:bg-zinc-700 hover:text-zinc-300 transition-all"><Icon name="RefreshCcw" /> Limpar Checklist</button>
                                </div>
                            </aside>

                            <main className="lg:col-span-8 space-y-6">
                                <section>
                                    <h2 className="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Database" className="text-purple-500" /> Recursos Base</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        {sortedRaw.map(([id, d]) => (
                                            <div key={id} className={`p-2.5 rounded-lg border flex items-center justify-between ${d.net <= 0 ? 'bg-emerald-500/5 border-emerald-500/20 opacity-50' : 'bg-zinc-900 border-zinc-800'}`}>
                                                <div className="flex items-center gap-2.5 overflow-hidden">
                                                    <button onClick={() => {const n = new Set(completedItems); n.has(id) ? n.delete(id) : n.add(id); setCompletedItems(n);}} className={`p-1 rounded border shrink-0 ${completedItems.has(id) ? 'bg-emerald-600 border-emerald-600' : 'border-zinc-700'}`}><Icon name="Check" className="text-white"/></button>
                                                    <div className="truncate">
                                                        <p className={`text-[9px] font-bold truncate ${ITEMS_DATA[id]?.color}`}>{ITEMS_DATA[id]?.name}</p>
                                                        <p className="text-[12px] font-mono font-black text-white">{d.net <= 0 ? 'OK' : Math.ceil(d.net).toLocaleString()} <span className="text-[7px] text-zinc-500 font-bold uppercase">{ITEMS_DATA[id]?.unit}</span></p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h2 className="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="Layers" className="text-indigo-500" /> Cadeia de Produção</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                        {sortedInter.map(([id, d]) => (
                                            <div key={id} className={`p-2.5 rounded-lg border flex items-center justify-between ${d.net <= 0 ? 'bg-emerald-500/5 border-emerald-500/20 opacity-50' : 'bg-zinc-900 border-zinc-800'}`}>
                                                <div className="flex items-center gap-2.5 overflow-hidden">
                                                    <button onClick={() => {const n = new Set(completedItems); n.has(id) ? n.delete(id) : n.add(id); setCompletedItems(n);}} className={`p-1 rounded border shrink-0 ${completedItems.has(id) ? 'bg-emerald-600 border-emerald-600' : 'border-zinc-700'}`}><Icon name="Check" className="text-white"/></button>
                                                    <div className="truncate">
                                                        <p className="text-[9px] font-bold text-zinc-400 truncate tracking-tight">{RECIPES[id]?.name}</p>
                                                        <p className="text-[12px] font-mono font-black text-white">{d.net <= 0 ? 'OK' : Math.ceil(d.net).toLocaleString()} <span className="text-[7px] text-zinc-500 font-bold uppercase">un</span></p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </main>
                        </div>
                    ) : viewMode === 'surplus' ? (
                        <div className="bg-zinc-900/50 p-6 rounded-xl border border-zinc-800">
                            <h2 className="text-sm font-black uppercase italic mb-6 tracking-tight flex items-center gap-2 tracking-widest text-emerald-500"><Icon name="Plus" /> Sobras do Processamento</h2>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                {Object.entries(totals.surplus).filter(([_, q]) => q > 0.01).sort((a,b) => b[1]-a[1]).map(([id, qty]) => (
                                    <div key={id} className="p-3 rounded-lg bg-zinc-950 border border-zinc-800 flex justify-between items-center group">
                                        <div className="overflow-hidden">
                                            <p className="text-[7px] font-black text-zinc-600 uppercase tracking-widest truncate">{RECIPES[id]?.tier || 'SUB-ITEM'}</p>
                                            <p className="text-[10px] font-bold text-zinc-200 truncate">{RECIPES[id]?.name || ITEMS_DATA[id]?.name}</p>
                                        </div>
                                        <p className="text-lg font-mono font-black text-emerald-500 ml-2">+{Math.floor(qty)}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                            {Object.entries(RECIPES).filter(([_, r]) => r.tier).sort((a,b) => a[1].tier.localeCompare(b[1].tier)).map(([id, r]) => (
                                <div key={id} className="bg-zinc-900/40 p-3 rounded-lg border border-zinc-800 flex flex-col h-full">
                                    <div className="flex justify-between items-center mb-2"><h3 className="text-[9px] font-black text-zinc-100 uppercase tracking-tight italic">{r.name}</h3><span className="text-[6px] bg-violet-500/10 text-violet-400 px-1 py-0.5 rounded font-black uppercase">{r.tier}</span></div>
                                    <div className="space-y-1 flex-grow">{r.inputs.map((i, idx) => <div key={idx} className="flex justify-between text-[8px] text-zinc-500 border-b border-zinc-800/30 pb-0.5 last:border-0"><span>{ITEMS_DATA[i.id]?.name || RECIPES[i.id]?.name}</span><span className="font-bold text-zinc-400">{i.qty} {ITEMS_DATA[i.id]?.unit || 'un'}</span></div>)}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
